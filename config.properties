# Configuration for ORAN CSV Generator
[DEFAULT]
# Starting GNodeB ID – identifier for the first generated gNodeB
StartingGNodeBId = 15001

# Total number of NR cells – defines how many NR cells to generate across all gNodeBs
NumberOfNRCells = 150

# Base GC profile – used to construct GC profile strings for components
GCProfile = 77.1.1
# IP address class type: 'ipv4' or 'ipv6'. Determines which address is used for CUUP (both supported) and which GC profile suffix is applied.
IPAddrClassType = ipv4
# IPv4 address – used when IP class is 'ipv4' (applies to CUUP).
IPv4Address = 10.10.10.10
# IPv6 address – used for all other components (CUCP, DU, ORU) and when IP class is 'ipv6'.
IPv6Address = fd10:298c:8df3:398:c3:0:1:75d0
